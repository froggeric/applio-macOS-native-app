<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Applio</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-color: #ffffff;
            --accent-color: #007aff;
            --muted-text: #b0b0b0;
            --detail-text: #808080;
            --button-bg: rgba(255, 255, 255, 0.1);
            --button-hover: rgba(255, 255, 255, 0.15);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .container {
            text-align: center;
            width: 85%;
            max-width: 340px;
        }

        .logo-container {
            margin-bottom: 24px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 6px;
            background: linear-gradient(180deg, #fff 0%, #666 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.9;
        }

        .version {
            font-size: 13px;
            color: var(--muted-text);
            margin-bottom: 20px;
            font-weight: 500;
        }

        .description {
            font-size: 12px;
            color: var(--detail-text);
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .copyright {
            font-size: 11px;
            color: var(--detail-text);
            margin-bottom: 8px;
        }

        .repo-link {
            margin-bottom: 24px;
        }

        .repo-link a {
            font-size: 11px;
            color: var(--accent-color);
            text-decoration: none;
        }

        .repo-link a:hover {
            text-decoration: underline;
        }

        .button {
            background-color: var(--button-bg);
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-color);
            cursor: pointer;
            transition: background-color 0.2s ease;
            font-family: inherit;
        }

        .button:hover {
            background-color: var(--button-hover);
        }

        .button:active {
            background-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo-text">APPLIO</div>
        </div>

        <div class="version" id="version">Version {{APPLIO_VERSION}}</div>

        <div class="description">
            Voice conversion application built on RVC<br>
            (Retrieval-Based Voice Conversion)
        </div>

        <div class="copyright">&copy; 2026 Fr&eacute;d&eacute;ric Guigand</div>

        <div class="repo-link">
            <a href="https://github.com/froggeric/applio-macOS-native-app" onclick="open_repo(event)">github.com/froggeric/applio-macOS-native-app</a>
        </div>

        <button class="button" onclick="check_updates()">Check for Updates</button>
    </div>

    <script>
        // Placeholder functions - will be connected to Python via pywebview API
        function open_repo(event) {
            event.preventDefault();
            if (window.pywebview) {
                pywebview.api.open_repo_link();
            } else {
                window.open('https://github.com/froggeric/applio-macOS-native-app', '_blank');
            }
        }

        function check_updates() {
            if (window.pywebview) {
                pywebview.api.check_for_updates();
            } else {
                alert('Update checking is not available in preview mode.');
            }
        }
    </script>
</body>

</html>
